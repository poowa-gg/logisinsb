<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS safe area + proper scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F6E56" />
    <meta name="description" content="Logistix — send package, sell goods, or track delivery, easy way. Real-time logistics platform for Nigeria." />

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Open Graph for link previews -->

      body { margin: 0; background: #ffffff; font-family: 'Inter', sans-serif; }
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
